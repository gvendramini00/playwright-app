# ── Dev profile ──────────────────────────────────────────────────────────────
# Activate with: --spring.profiles.active=dev
# Or set env var: SPRING_PROFILES_ACTIVE=dev
#
# Credentials (ALIRA_USERNAME, ALIRA_PASSWORD, CGM_DB_USERNAME, etc.) must be
# set as environment variables — see .env.example. Load them via your IDE run
# configuration or a terminal session. Never hardcode credentials here.

# Show SQL in dev for easier debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Watch the browser locally — flip to true to run headless
playwright.headless=false

# ── Alira Back Office (URL defaults — credentials from env vars) ──────────────
alira.login-url=${ALIRA_LOGIN_URL:https://gms.dev.tecnalis.com/alira-server/login.jsp}
alira.base-url=${ALIRA_BASE_URL:https://gms.dev.tecnalis.com/alira-server/}

# ── CGM datasource (URL default — credentials from env vars) ─────────────────
datasource.cgm.url=${CGM_DB_URL:jdbc:mysql://192.168.16.56:3306/OGP?useSSL=false&serverTimezone=UTC}

# ── GP-PT datasource (URL default — credentials from env vars) ───────────────
datasource.gppt.url=${GPPT_DB_URL:jdbc:mysql://192.168.16.21:3306/OGP?useSSL=false&serverTimezone=UTC}
