# Application name

# Common
spring.application.name=MyPlayRightApp
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.generate-ddl=false
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Playwright — set to false locally if you need to watch the browser
playwright.headless=true

# Swagger — keep API docs enabled, serve our own custom UI
springdoc.api-docs.groups.enabled=true
springdoc.swagger-ui.enabled=false

# Alira Back Office credentials (required — set via environment variables or .env)
alira.username=${ALIRA_USERNAME}
alira.password=${ALIRA_PASSWORD}
alira.login-url=${ALIRA_LOGIN_URL:https://gms.pre.tecnalis.com/alira-server/login.jsp}
alira.base-url=${ALIRA_BASE_URL:https://gms.pre.tecnalis.com/alira-server/}

# Alira Staging credentials (required — set via environment variables or .env)
alira.staging.username=${ALIRA_STAGING_USERNAME}
alira.staging.password=${ALIRA_STAGING_PASSWORD}
alira.staging.login-url=${ALIRA_STAGING_LOGIN_URL:https://gms-staging.pre.tecnalis.com/alira-server/login.jsp}
alira.staging.base-url=${ALIRA_STAGING_BASE_URL:https://gms-staging.pre.tecnalis.com/alira-server/}

# Staging datasource (required — set via environment variables or .env)
datasource.staging.url=${STAGING_DB_URL:jdbc:mysql://10.64.134.11:3306/OGP?useSSL=false&serverTimezone=UTC}
datasource.staging.username=${STAGING_DB_USERNAME}
datasource.staging.password=${STAGING_DB_PASSWORD}

# CGM datasource (required — set via environment variables or .env)
datasource.cgm.url=${CGM_DB_URL:jdbc:mysql://192.168.16.56:3306/OGP?useSSL=false&serverTimezone=UTC}
datasource.cgm.username=${CGM_DB_USERNAME}
datasource.cgm.password=${CGM_DB_PASSWORD}

# GP-PT datasource (required — set via environment variables or .env)
datasource.gppt.url=${GPPT_DB_URL:jdbc:mysql://192.168.16.21:3306/OGP?useSSL=false&serverTimezone=UTC}
datasource.gppt.username=${GPPT_DB_USERNAME}
datasource.gppt.password=${GPPT_DB_PASSWORD}
