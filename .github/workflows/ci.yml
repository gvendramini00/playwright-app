name: CI

on:
  push:
    branches: [ "main", "master", "develop", "feature/**" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    name: Build & compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build (skip E2E tests — they require live DB + browser environment)
        run: mvn clean package -DskipTests --no-transfer-progress

      # ── Optional: smoke-run E2E tests in a self-hosted runner that has
